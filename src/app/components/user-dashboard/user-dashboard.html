<h1>User Dashboard</h1>

<button (click)="openModal()">
  Add User
</button>

<br><br>

<div class="table-container">

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.role }}</td>
      </tr>
    </tbody>
  </table>

</div>
<br><br>

<div class="chart-container">
  <canvas
    #pieChart
    width="400"
    height="400">
  </canvas>
</div>

<div
  class="modal-backdrop"
  *ngIf="showModal"
>

  <div class="modal">

    <app-user-form
      (close)="closeModal()"
      (userAdded)="onUserAdded($event)"
    >
    </app-user-form>

  </div>

</div>
